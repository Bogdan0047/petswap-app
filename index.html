    <!-- Force HTTPS once the page is loaded over http on the production domain -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          if (
            location.protocol === "http:" &&
            (h === "petswap.co.uk" || h === "www.petswap.co.uk")
          ) {
            location.replace("https://petswap.co.uk" + location.pathname + location.search + location.hash);
          } else if (h === "www.petswap.co.uk") {
            location.replace("https://petswap.co.uk" + location.pathname + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>

    <!-- JSON-LD organization for trust + rich results -->
    <script type="application/ld+json">
