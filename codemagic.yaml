workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: Codemagic PetSwap

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.petswap.app

      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APPLE_TEAM_ID: "KFF8GW57Z9"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Force iOS bundle id
        script: |
          ruby -pi -e 'gsub(/PRODUCT_BUNDLE_IDENTIFIER = .*?;/, "PRODUCT_BUNDLE_IDENTIFIER = com.petswap.app;")' ios/App/App.xcodeproj/project.pbxproj
          ruby -pi -e 'gsub(/DEVELOPMENT_TEAM = .*?;/, "DEVELOPMENT_TEAM = KFF8GW57Z9;")' ios/App/App.xcodeproj/project.pbxproj
          grep -n "PRODUCT_BUNDLE_IDENTIFIER\|DEVELOPMENT_TEAM" ios/App/App.xcodeproj/project.pbxproj

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true