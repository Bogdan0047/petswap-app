- name: Force iOS settings
  script: |
    python3 - <<'PY'
    from pathlib import Path
    import re

    p = Path("ios/App/App.xcodeproj/project.pbxproj")
    text = p.read_text()

    text = re.sub(r"CURRENT_PROJECT_VERSION = .*?;", "CURRENT_PROJECT_VERSION = 4;", text)
    text = re.sub(r"MARKETING_VERSION = .*?;", "MARKETING_VERSION = 1.1;", text)

    p.write_text(text)
    PY'
