workflows:
  ios-workflow:
    name: iOS Workflow

    integrations:
      app_store_connect: Codemagic PetSwap

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.petswap.app

      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        APPLE_TEAM_ID: "KFF8GW57Z9"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web assets
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Force iOS settings
        script: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("ios/App/App.xcodeproj/project.pbxproj")
          text = p.read_text()

          text = re.sub(r"PRODUCT_BUNDLE_IDENTIFIER = .*?;", "PRODUCT_BUNDLE_IDENTIFIER = com.petswap.app;", text)
          text = re.sub(r"DEVELOPMENT_TEAM = .*?;", "DEVELOPMENT_TEAM = KFF8GW57Z9;", text)
          text = re.sub(r"CURRENT_PROJECT_VERSION = .*?;", "CURRENT_PROJECT_VERSION = 4;", text)
          text = re.sub(r"MARKETING_VERSION = .*?;", "MARKETING_VERSION = 1.1;", text)
          text = re.sub(r"CODE_SIGN_STYLE = .*?;", "CODE_SIGN_STYLE = Manual;", text)

          p.write_text(text)
          PY

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true