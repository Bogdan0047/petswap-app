workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.petswap.app

      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Debug signing assets
        script: |
          echo "Profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true
          echo "Certificates:"
          security find-identity -v -p codesigning || true

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CODE_SIGN_STYLE=Manual"

    artifacts:
      - build/ios/ipa/*.ipa